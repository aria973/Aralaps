<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="./apple-icon.png">
  <title>aralaps</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="theme-dark">
  <div class="app-shell">
    <header class="topbar">
      <button id="settingsBtn" class="icon-btn" type="button" aria-label="تنظیمات">
        <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
          <path d="M19.14 12.94a7.48 7.48 0 0 0 .05-.94 7.48 7.48 0 0 0-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.2 7.2 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 13.9 1h-3.8a.5.5 0 0 0-.49.42l-.36 2.54c-.58.22-1.13.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 7.48a.5.5 0 0 0 .12.64l2.03 1.58c-.03.31-.05.63-.05.94s.02.63.05.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.41 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.8a.5.5 0 0 0 .49-.42l.36-2.54c.58-.22 1.13-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/>
        </svg>
      </button>

      <div class="brand">
        <div class="brand-title">aralaps</div>
        <div class="brand-sub">interval timer</div>
      </div>

      <button id="themeBtn" class="icon-btn" type="button" aria-label="تغییر تم">
        <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
          <path d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.02-.67.05-1A1 1 0 0 0 10 1a11 11 0 1 0 11 11 1 1 0 0 0-1-1c-.33.03-.66.05-1 .05Z"/>
        </svg>
      </button>
    </header>

    <main class="main-stage">
      <div id="ambientBg" class="ambient-bg"></div>
      <div id="screenPulse" class="screen-pulse"></div>
      <div id="ringBurst" class="ring-burst"></div>

      <section class="timer-meta">
        <div id="cycleBadge" class="capsule">چرخه 1 از 1</div>
        <div id="partTitle" class="part-title">آماده</div>
        <div id="partMeta" class="part-meta">پارت 1 / 1</div>
      </section>

      <section class="timer-stage">
        <svg class="timer-ring" viewBox="0 0 320 320" aria-hidden="true">
          <defs>
            <linearGradient id="timerGradient" x1="0" y1="0" x2="1" y2="1">
              <stop id="ringStop1" offset="0%" stop-color="#7C5CFF"></stop>
              <stop id="ringStop2" offset="100%" stop-color="#25D0FF"></stop>
            </linearGradient>
          </defs>
          <circle class="timer-ring-track" cx="160" cy="160" r="124"></circle>
          <circle id="timerRingProgress" class="timer-ring-progress" cx="160" cy="160" r="124"></circle>
        </svg>

        <div class="timer-center">
          <div id="remainingLabel" class="remaining-label">00:30.0</div>
          <div id="elapsedLabel" class="elapsed-label">گذشته: 00:00.0</div>
        </div>
      </section>

      <section id="timelineBar" class="timeline-bar"></section>

      <section class="controls">
        <button id="nextBtn" class="control-btn secondary" type="button" aria-label="بعدی">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M6 5.5v13l9-6.5-9-6.5Zm10 0h2v13h-2v-13Z"/>
          </svg>
        </button>

        <button id="playPauseBtn" class="control-btn primary" type="button" aria-label="شروع یا توقف">
          <svg id="playPauseIcon" viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M8 5.5v13l10-6.5-10-6.5Z"/>
          </svg>
        </button>

        <button id="resetBtn" class="control-btn secondary" type="button" aria-label="ریست">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M12 5a7 7 0 1 1-6.65 9.2H3l3.5-3.5L10 14H7.4A5 5 0 1 0 12 7V5Z"/>
          </svg>
        </button>
      </section>
    </main>
  </div>

  <div id="settingsModal" class="modal hidden" aria-hidden="true">
    <div id="modalBackdrop" class="modal-backdrop"></div>

    <div class="modal-sheet">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <div>
          <div class="sheet-title">تنظیمات aralaps</div>
          <div class="sheet-subtitle">پارت‌ها، صداها، تاریخچه و ظاهر اپ</div>
        </div>

        <button id="closeSettingsBtn" class="icon-btn small" type="button" aria-label="بستن">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M6.7 5.3 5.3 6.7 10.6 12l-5.3 5.3 1.4 1.4 5.3-5.3 5.3 5.3 1.4-1.4-5.3-5.3 5.3-5.3-1.4-1.4-5.3 5.3-5.3-5.3Z"/>
          </svg>
        </button>
      </div>

      <div class="sheet-tabs">
        <button id="tabTimerBtn" class="sheet-tab active" type="button">تایمر</button>
        <button id="tabSoundBtn" class="sheet-tab" type="button">صدا</button>
        <button id="tabHistoryBtn" class="sheet-tab" type="button">تاریخچه</button>
      </div>

      <div class="sheet-body">
        <section id="timerTab" class="settings-tab active">
          <div class="settings-block">
            <div class="block-title">عمومی</div>

            <label class="field">
              <span>تعداد تکرار کل سیکل</span>
              <input id="repeatCountInput" class="text-input" type="number" min="1" max="999" inputmode="numeric" />
            </label>

            <div class="toggle-list">
              <label class="toggle-row">
                <span>ویبره</span>
                <input id="vibrateToggle" type="checkbox" />
              </label>

              <label class="toggle-row">
                <span>هشدار صوتی</span>
                <input id="alertsToggle" type="checkbox" />
              </label>
            </div>
          </div>

          <div class="settings-block">
            <div class="block-title">پارت‌ها</div>
            <div id="partsEditor" class="parts-editor"></div>

            <button id="addPartBtn" class="wide-btn" type="button">
              <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"/>
              </svg>
              <span>افزودن پارت</span>
            </button>
          </div>
        </section>

        <section id="soundTab" class="settings-tab">
          <div class="settings-block">
            <div class="block-title">تنظیمات کلی صدا</div>

            <div class="toggle-list">
              <label class="toggle-row">
                <span>استفاده از صدای پیش‌فرض داخلی</span>
                <input id="builtInSoundsToggle" type="checkbox" />
              </label>

              <label class="toggle-row">
                <span>tick مکانیکی انتخاب زمان</span>
                <input id="wheelTickToggle" type="checkbox" />
              </label>
            </div>
          </div>

          <div class="settings-block">
            <div class="block-title">صدای شروع</div>
            <div class="sound-card">
              <label class="field">
                <span>فایل صوتی</span>
                <input id="startSoundInput" class="file-input" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg" />
              </label>

              <div class="wave-editor">
                <canvas id="startWaveCanvas" class="wave-canvas" width="800" height="140"></canvas>
                <div id="startTrimOverlay" class="trim-overlay">
                  <div id="startTrimShadeLeft" class="trim-shade left"></div>
                  <div id="startTrimShadeRight" class="trim-shade right"></div>
                  <div id="startTrimHandleStart" class="trim-handle start"></div>
                  <div id="startTrimHandleEnd" class="trim-handle end"></div>
                  <div id="startPlayhead" class="wave-playhead hidden"></div>
                </div>
                <div class="trim-readout">
                  <span id="startTrimLabel">0.0s — 0.0s</span>
                </div>
              </div>

              <div class="range-stack">
                <input id="startTrimStartInput" class="trim-range trim-back" type="range" min="0" max="100" step="0.01" value="0" />
                <input id="startTrimEndInput" class="trim-range trim-front" type="range" min="0" max="100" step="0.01" value="100" />
              </div>

              <div class="sound-actions">
                <button id="previewStartBtn" class="icon-square-btn" type="button" aria-label="پیش‌نمایش">
                  <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                    <path d="M8 5.5v13l10-6.5-10-6.5Z"/>
                  </svg>
                </button>
                <button id="clearStartBtn" class="wide-btn danger" type="button">حذف صدا</button>
                <button id="restoreStartBtn" class="wide-btn" type="button">پیش‌فرض</button>
              </div>
            </div>
          </div>

          <div class="settings-block">
            <div class="block-title">صدای تعویض پارت</div>
            <div class="sound-card">
              <label class="field">
                <span>فایل صوتی</span>
                <input id="switchSoundInput" class="file-input" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg" />
              </label>

              <div class="wave-editor">
                <canvas id="switchWaveCanvas" class="wave-canvas" width="800" height="140"></canvas>
                <div id="switchTrimOverlay" class="trim-overlay">
                  <div id="switchTrimShadeLeft" class="trim-shade left"></div>
                  <div id="switchTrimShadeRight" class="trim-shade right"></div>
                  <div id="switchTrimHandleStart" class="trim-handle start"></div>
                  <div id="switchTrimHandleEnd" class="trim-handle end"></div>
                  <div id="switchPlayhead" class="wave-playhead hidden"></div>
                </div>
                <div class="trim-readout">
                  <span id="switchTrimLabel">0.0s — 0.0s</span>
                </div>
              </div>

              <div class="range-stack">
                <input id="switchTrimStartInput" class="trim-range trim-back" type="range" min="0" max="100" step="0.01" value="0" />
                <input id="switchTrimEndInput" class="trim-range trim-front" type="range" min="0" max="100" step="0.01" value="100" />
              </div>

              <div class="sound-actions">
                <button id="previewSwitchBtn" class="icon-square-btn" type="button" aria-label="پیش‌نمایش">
                  <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                    <path d="M8 5.5v13l10-6.5-10-6.5Z"/>
                  </svg>
                </button>
                <button id="clearSwitchBtn" class="wide-btn danger" type="button">حذف صدا</button>
                <button id="restoreSwitchBtn" class="wide-btn" type="button">پیش‌فرض</button>
              </div>
            </div>
          </div>

          <div class="settings-block">
            <div class="block-title">صدای پایان کل</div>
            <div class="sound-card">
              <label class="field">
                <span>فایل صوتی</span>
                <input id="finishSoundInput" class="file-input" type="file" accept="audio/*,.mp3,.wav,.m4a,.aac,.ogg" />
              </label>

              <div class="wave-editor">
                <canvas id="finishWaveCanvas" class="wave-canvas" width="800" height="140"></canvas>
                <div id="finishTrimOverlay" class="trim-overlay">
                  <div id="finishTrimShadeLeft" class="trim-shade left"></div>
                  <div id="finishTrimShadeRight" class="trim-shade right"></div>
                  <div id="finishTrimHandleStart" class="trim-handle start"></div>
                  <div id="finishTrimHandleEnd" class="trim-handle end"></div>
                  <div id="finishPlayhead" class="wave-playhead hidden"></div>
                </div>
                <div class="trim-readout">
                  <span id="finishTrimLabel">0.0s — 0.0s</span>
                </div>
              </div>

              <div class="range-stack">
                <input id="finishTrimStartInput" class="trim-range trim-back" type="range" min="0" max="100" step="0.01" value="0" />
                <input id="finishTrimEndInput" class="trim-range trim-front" type="range" min="0" max="100" step="0.01" value="100" />
              </div>

              <div class="sound-actions">
                <button id="previewFinishBtn" class="icon-square-btn" type="button" aria-label="پیش‌نمایش">
                  <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
                    <path d="M8 5.5v13l10-6.5-10-6.5Z"/>
                  </svg>
                </button>
                <button id="clearFinishBtn" class="wide-btn danger" type="button">حذف صدا</button>
                <button id="restoreFinishBtn" class="wide-btn" type="button">پیش‌فرض</button>
              </div>
            </div>
          </div>
        </section>

        <section id="historyTab" class="settings-tab">
          <div class="settings-block">
            <div class="block-title">تاریخچه تایمرها</div>
            <div id="historyList" class="history-list"></div>
          </div>
        </section>
      </div>

      <div class="sheet-footer">
        <button id="cancelSettingsBtn" class="wide-btn" type="button">لغو</button>
        <button id="applySettingsBtn" class="wide-btn primary-btn" type="button">تأیید</button>
      </div>
    </div>
  </div>

  <template id="partEditorTemplate">
    <div class="part-card">
      <div class="part-card-head">
        <div class="mini-badge">پارت</div>

        <button class="icon-btn small delete-part-btn" type="button" aria-label="حذف">
          <svg viewBox="0 0 24 24" class="icon" aria-hidden="true">
            <path d="M7 6h10l-1 14H8L7 6Zm3-3h4l1 2h4v2H5V5h4l1-2Z"/>
          </svg>
        </button>
      </div>

      <label class="field">
        <span>نام</span>
        <input class="text-input js-name" type="text" maxlength="24" />
      </label>

      <div class="picker-row picker-force-ltr">
        <div class="picker-block picker-minutes">
          <div class="picker-label">دقیقه</div>
          <div class="wheel-shell">
            <div class="wheel-highlight"></div>
            <div class="wheel-list js-minutes-wheel"></div>
          </div>
        </div>

        <div class="picker-separator">:</div>

        <div class="picker-block picker-seconds">
          <div class="picker-label">ثانیه</div>
          <div class="wheel-shell">
            <div class="wheel-highlight"></div>
            <div class="wheel-list js-seconds-wheel"></div>
          </div>
        </div>
      </div>

      <div class="field">
        <span>رنگ</span>
        <div class="swatches js-swatches"></div>
      </div>
    </div>
  </template>

  <script src="./app.js"></script>
</body>
</html>
